<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧟 僵尸生存者</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0f0f1a; 
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    #game {
      position: relative;
      border: 2px solid #4ade80;
      border-radius: 8px;
      overflow: hidden;
    }
    canvas {
      display: block;
      background: #1a1a2e;
    }
    #login {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    #login h1 { font-size: 2.5rem; margin-bottom: 1.5rem; color: #4ade80; }
    #login input {
      padding: 0.8rem 1.5rem;
      font-size: 1.1rem;
      border: 2px solid #4ade80;
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      margin-bottom: 1rem;
      outline: none;
      width: 200px;
      text-align: center;
    }
    #login button {
      padding: 0.8rem 2rem;
      font-size: 1.1rem;
      background: #4ade80;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      padding: 8px 15px;
      background: rgba(0,0,0,0.7);
      border-radius: 5px;
      font-size: 14px;
    }
    #inventory {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      max-width: 180px;
    }
    #inventory h3 { margin-bottom: 5px; color: #4ade80; }
    #crafting {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 11px;
      max-width: 160px;
      display: none;
    }
    #crafting h3 { margin-bottom: 5px; color: #f59e0b; }
    #crafting button {
      display: block;
      width: 100%;
      margin: 2px 0;
      padding: 4px;
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
    }
    #crafting button:hover { background: #444; }
    #crafting button:disabled { opacity: 0.4; }
    #status {
      position: absolute;
      top: 50px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 8px;
      border-radius: 5px;
      font-size: 11px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="game">
    <canvas id="canvas" width="800" height="600"></canvas>
    <div id="login">
      <h1>🧟 僵尸生存者</h1>
      <input type="text" id="nameInput" placeholder="输入你的名字" />
      <button id="joinBtn">开始游戏</button>
    </div>
    <div id="hud" class="hidden">
      <span id="time">12:00</span>
      <span id="phase">☀️ 白天</span>
      <span id="wave">🧟 0</span>
      <span id="fps">60 FPS</span>
    </div>
    <div id="status" class="hidden">
      <div>❤️ <span id="health">100</span></div>
      <div>🪵 <span id="wood">0</span></div>
      <div>🪨 <span id="stone">0</span></div>
      <div>🔩 <span id="metal">0</span></div>
    </div>
    <div id="inventory" class="hidden">
      <h3>🎒 按C合成</h3>
      <div id="invList"></div>
    </div>
    <div id="crafting">
      <h3>🔨 合成 (C关闭)</h3>
      <button data-recipe="木剑">🗡️ 木剑</button>
      <button data-recipe="石剑">⚔️ 石剑</button>
      <button data-recipe="木弓">🏹 木弓</button>
      <button data-recipe="绷带">🩹 绷带</button>
      <button data-recipe="木墙">🧱 木墙</button>
    </div>
  </div>

  <script>
    const API_BASE = '';
    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;
    const MAP_WIDTH = 2000;
    const MAP_HEIGHT = 2000;
    const SYNC_INTERVAL = 200; // 同步间隔200ms
    
    let playerId = null;
    // 本地预测位置（立即移动）
    let localX = 1000;
    let localY = 1000;
    // 服务器确认位置
    let serverX = 1000;
    let serverY = 1000;
    
    let gameState = null;
    let lastSync = 0;
    let showCrafting = false;
    let lastFrameTime = performance.now();
    let frameCount = 0;
    let fps = 60;
    
    // 本地数据
    let inventory = { wood: 0, stone: 0, metal: 0, food: 0 };
    let weapon = null;
    let health = 100;
    
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    const RES_COLORS = { wood: '#92400e', stone: '#6b7280', metal: '#475569', food: '#dc2626', herb: '#16a34a' };
    const RES_ICONS = { wood: '🪵', stone: '🪨', metal: '🔩', food: '🍎', herb: '🌿' };
    
    const RECIPES = {
      '木剑': { wood: 8, attack: 5 },
      '石剑': { wood: 5, stone: 10, attack: 10 },
      '木弓': { wood: 10, herb: 2, attack: 8 },
      '绷带': { herb: 2, food: 1 },
      '木墙': { wood: 15 }
    };
    
    // ========== 核心：本地预测移动 ==========
    const keys = {};
    let isMoving = false;
    let lastMoveTime = 0;
    
    document.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      if (e.key.toLowerCase() === 'c') {
        showCrafting = !showCrafting;
        document.getElementById('crafting').style.display = showCrafting ? 'block' : 'none';
      }
    });
    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    
    // 60FPS本地渲染循环
    function gameLoop() {
      // 计算FPS
      frameCount++;
      const now = performance.now();
      if (now - lastFrameTime >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastFrameTime = now;
        document.getElementById('fps').textContent = fps + ' FPS';
      }
      
      // 本地预测移动（立即响应）
      moveLocally();
      
      // 渲染
      render();
      
      // 定期同步服务器
      if (playerId && now - lastSync > SYNC_INTERVAL) {
        syncToServer();
        lastSync = now;
      }
      
      requestAnimationFrame(gameLoop);
    }
    
    // 本地移动 - 完全不依赖服务器
    function moveLocally() {
      const speed = 6;
      let dx = 0, dy = 0;
      
      if (keys['w'] || keys['arrowup']) dy -= speed;
      if (keys['s'] || keys['arrowdown']) dy += speed;
      if (keys['a'] || keys['arrowleft']) dx -= speed;
      if (keys['d'] || keys['arrowright']) dx += speed;
      
      if (dx !== 0 || dy !== 0) {
        isMoving = true;
        localX = Math.max(0, Math.min(MAP_WIDTH, localX + dx));
        localY = Math.max(0, Math.min(MAP_HEIGHT, localY + dy));
        
        // 本地检测采集和攻击
        checkHarvestLocal();
        checkAttackLocal();
      } else {
        isMoving = false;
      }
    }
    
    // 异步同步到服务器
    async function syncToServer() {
      try {
        const res = await fetch(API_BASE + '/api/game?playerId=' + playerId + '&x=' + Math.floor(localX) + '&y=' + Math.floor(localY));
        const state = await res.json();
        gameState = state;
        
        // 同步其他玩家位置（不做平滑处理，简单替换）
        // 自己的位置以本地为准，忽略服务器返回
      } catch (e) { /* 忽略同步错误 */ }
    }
    
    // 本地检测采集
    function checkHarvestLocal() {
      if (!gameState) return;
      for (const r of gameState.resources) {
        const dist = Math.hypot(r.x - localX, r.y - localY);
        if (dist < 35 && r.amount > 0) {
          inventory[r.type] = (inventory[r.type] || 0) + 1;
          r.amount--;
          updateInventoryUI();
          // 异步通知服务器
          fetch(API_BASE + '/api/game', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'harvest', playerId, resourceId: r.id })
          });
          break;
        }
      }
    }
    
    // 本地检测攻击
    function checkAttackLocal() {
      if (!gameState || !weapon) return;
      for (const z of gameState.zombies) {
        const dist = Math.hypot(z.x - localX, z.y - localY);
        if (dist < 50) {
          // 本地减少僵尸血量
          z.health -= weapon.attack;
          if (z.health <= 0) {
            gameState.zombies = gameState.zombies.filter(zz => zz.id !== z.id);
          }
          // 异步通知服务器
          fetch(API_BASE + '/api/game', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'attack', playerId, targetId: z.id, damage: weapon.attack })
          });
          break;
        }
      }
    }
    
    // ========== 渲染 ==========
    function render() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      
      // 相机跟随本地位置
      const camX = localX - CANVAS_WIDTH / 2;
      const camY = localY - CANVAS_HEIGHT / 2;
      
      // 网格
      ctx.strokeStyle = '#2a2a3e';
      for (let x = -camX % 32; x < CANVAS_WIDTH; x += 32) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_HEIGHT); ctx.stroke();
      }
      for (let y = -camY % 32; y < CANVAS_HEIGHT; y += 32) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_WIDTH, y); ctx.stroke();
      }
      
      if (!gameState) return;
      
      // 资源
      for (const r of gameState.resources) {
        const sx = r.x - camX, sy = r.y - camY;
        if (sx < -30 || sx > CANVAS_WIDTH + 30 || sy < -30 || sy > CANVAS_HEIGHT + 30) continue;
        ctx.fillStyle = RES_COLORS[r.type] || '#888';
        ctx.fillRect(sx - 10, sy - 10, 20, 20);
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(RES_ICONS[r.type] || '?', sx, sy + 4);
      }
      
      // 建筑
      for (const b of gameState.buildings || []) {
        const sx = b.x - camX, sy = b.y - camY;
        ctx.fillStyle = '#78716c';
        ctx.fillRect(sx - 20, sy - 20, 40, 40);
        ctx.font = '16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🏠', sx, sy + 6);
      }
      
      // 僵尸
      const zombieIcons = { normal: '🧟', fast: '💨', giant: '👹', crawler: '🕷️' };
      for (const z of gameState.zombies) {
        const sx = z.x - camX, sy = z.y - camY;
        ctx.fillStyle = z.type === 'giant' ? '#dc2626' : z.type === 'fast' ? '#f59e0b' : z.type === 'crawler' ? '#8b5cf6' : '#84cc16';
        ctx.beginPath();
        ctx.arc(sx, sy, z.type === 'giant' ? 22 : 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.font = '11px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(zombieIcons[z.type] || '🧟', sx, sy + 4);
        // 血条
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(sx - 12, sy - 25, 24 * (z.health / (z.type === 'giant' ? 200 : z.type === 'fast' ? 30 : 50)), 3);
      }
      
      // 其他玩家
      for (const p of gameState.players) {
        if (p.id === playerId) continue;
        const sx = p.x - camX, sy = p.y - camY;
        ctx.fillStyle = '#22c55e';
        ctx.beginPath(); ctx.arc(sx, sy, 14, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(p.name, sx, sy - 20);
      }
      
      // 自己（始终在中间）
      ctx.fillStyle = '#4ade80';
      ctx.beginPath();
      ctx.arc(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, 16, 0, Math.PI * 2);
      ctx.fill();
      
      // 武器
      if (weapon) {
        ctx.font = '14px Arial';
        ctx.fillText('🗡️', CANVAS_WIDTH / 2 + 18, CANVAS_HEIGHT / 2);
      }
      
      // 名字
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('你', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 22);
      
      // 血条
      ctx.fillStyle = '#ef4444';
      ctx.fillRect(CANVAS_WIDTH / 2 - 18, CANVAS_HEIGHT / 2 - 20, 36 * (health / 100), 4);
    }
    
    // ========== 其他功能 ==========
    async function joinGame() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) return;
      
      try {
        const res = await fetch(API_BASE + '/api/game', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'join', name })
        });
        
        const data = await res.json();
        playerId = data.playerId;
        localX = data.player.x;
        localY = data.player.y;
        
        document.getElementById('login').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('status').classList.remove('hidden');
        document.getElementById('inventory').classList.remove('hidden');
        
        // 启动游戏循环
        gameLoop();
        
        // 初始获取状态
        syncToServer();
      } catch (e) {
        alert('连接失败');
      }
    }
    
    function updateHUD() {
      if (!gameState) return;
      const hour = Math.floor(gameState.dayTime);
      document.getElementById('time').textContent = hour + ':00';
      document.getElementById('phase').textContent = gameState.phase === 'day' ? '☀️' : gameState.phase === 'twilight' ? '🌆' : '🧟';
      document.getElementById('wave').textContent = '🧟 ' + (gameState.wave || 0);
      
      const me = gameState.players?.find(p => p.id === playerId);
      if (me) health = me.health || 100;
      document.getElementById('health').textContent = Math.floor(health);
    }
    
    // 每秒更新一次HUD（减少DOM操作）
    setInterval(updateHUD, 1000);
    
    function updateInventoryUI() {
      let html = '';
      for (const [type, count] of Object.entries(inventory)) {
        if (count > 0) html += `<div>${RES_ICONS[type] || type} ${count}</div>`;
      }
      if (weapon) html += `<div>🗡️ ${weapon.name}</div>`;
      document.getElementById('invList').innerHTML = html || '空';
      
      // 更新合成按钮
      document.querySelectorAll('#crafting button').forEach(btn => {
        const r = RECIPES[btn.dataset.recipe];
        let can = true;
        for (const [m, n] of Object.entries(r)) {
          if (m !== 'attack' && (inventory[m] || 0) < n) can = false;
        }
        btn.disabled = !can;
      });
    }
    
    // 合成
    document.querySelectorAll('#crafting button').forEach(btn => {
      btn.addEventListener('click', () => {
        const r = RECIPES[btn.dataset.recipe];
        for (const [m, n] of Object.entries(r)) {
          if (m !== 'attack') inventory[m] -= n;
        }
        if (r.attack) weapon = { name: btn.dataset.recipe, attack: r.attack };
        if (btn.dataset.recipe === '绷带') health = Math.min(100, health + 30);
        updateInventoryUI();
      });
    });
    
    document.getElementById('joinBtn').addEventListener('click', joinGame);
  </script>
</body>
</html>
