<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🧟 僵尸生存者</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      background: #0f0f1a; 
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      touch-action: none;
      height: 100%;
    }
    #game {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f1a;
    }
    canvas {
      max-width: 100%;
      max-height: 100%;
    }
    #login {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      z-index: 100;
    }
    #login h1 { font-size: 2rem; margin-bottom: 1rem; color: #4ade80; }
    #login input {
      padding: 0.8rem;
      font-size: 1rem;
      border: 2px solid #4ade80;
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      margin-bottom: 1rem;
      width: 200px;
      text-align: center;
    }
    #login button {
      padding: 0.8rem 2rem;
      font-size: 1rem;
      background: #4ade80;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      padding: 8px;
      background: rgba(0,0,0,0.7);
      border-radius: 5px;
      font-size: 12px;
      z-index: 10;
    }
    #inventory {
      position: absolute;
      bottom: 100px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 8px;
      border-radius: 5px;
      font-size: 11px;
      z-index: 10;
      max-width: 140px;
    }
    #crafting {
      position: absolute;
      bottom: 100px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      padding: 8px;
      border-radius: 5px;
      font-size: 10px;
      z-index: 10;
      display: none;
      max-width: 120px;
    }
    #crafting button {
      display: block;
      width: 100%;
      margin: 2px 0;
      padding: 5px;
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
    }
    /* 移动端控制区 */
    #controls {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      display: none;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 20;
    }
    .control-group {
      display: flex;
      gap: 10px;
    }
    .ctrl-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(74, 222, 128, 0.3);
      border: 2px solid #4ade80;
      color: #fff;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .ctrl-btn:active { background: rgba(74, 222, 128, 0.6); }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 50px);
      grid-template-rows: repeat(3, 50px);
      gap: 2px;
    }
    .dpad .ctrl-btn {
      width: 50px;
      height: 50px;
      font-size: 18px;
    }
    .action-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .action-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.3);
      border: 2px solid #ef4444;
      font-size: 12px;
    }
    .action-btn.attack { background: rgba(239, 68, 68, 0.4); }
    .action-btn.craft { background: rgba(245, 158, 11, 0.4); border-color: #f59e0b; }
    
    /* 检测是否为移动端 */
    @media (max-width: 768px), (pointer: coarse) {
      #controls { display: flex; }
      #inventory { bottom: 120px; }
      #crafting { bottom: 120px; }
    }
    
    .hidden { display: none !important; }
  </style>
</head>

    document.querySelectorAll('.ctrl-btn[data-key]').forEach(btn => {
      const key = btn.dataset.key;
      
      btn.addEventListener('touchstart', e => { e.preventDefault(); touchKeys[key] = true; keys[key] = true; });
      btn.addEventListener('touchend', e => { e.preventDefault(); touchKeys[key] = false; keys[key] = false; });
      btn.addEventListener('touchcancel', e => { touchKeys[key] = false; keys[key] = false; });
    });
    
    // 攻击按钮
    document.getElementById('attackBtn').addEventListener('touchstart', e => {
      e.preventDefault();
      performAttack();
    });
    
    // 合成按钮
    document.getElementById('craftBtn').addEventListener('touchstart', e => {
      e.preventDefault();
      showCrafting = !showCrafting;
      document.getElementById('crafting').style.display = showCrafting ? 'block' : 'none';
    });
    
    // 键盘控制
    document.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      
      if (e.key.toLowerCase() === 'c') {
        showCrafting = !showCrafting;
        document.getElementById('crafting').style.display = showCrafting ? 'block' : 'none';
      }
      
      // 快捷使用血瓶
      if (e.key.toLowerCase() === 'h') {
        useHealthPotion();
      }
    });
    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    
    // 游戏循环
    function gameLoop() {
      moveLocally();
      render();
      
      if (playerId && Date.now() - lastSync > SYNC_INTERVAL) {
        syncToServer();
        lastSync = Date.now();
      }
      
      requestAnimationFrame(gameLoop);
    }
    
    function moveLocally() {
      const speed = 6;
      let dx = 0, dy = 0;
      
      if (keys['w'] || keys['arrowup']) dy -= speed;
      if (keys['s'] || keys['arrowdown']) dy += speed;
      if (keys['a'] || keys['arrowleft']) dx -= speed;
      if (keys['d'] || keys['arrowright']) dx += speed;
      
      if (dx !== 0 || dy !== 0) {
        localX = Math.max(0, Math.min(MAP_WIDTH, localX + dx));
        localY = Math.max(0, Math.min(MAP_HEIGHT, localY + dy));
        checkHarvestLocal();
      }
    }
    
    function checkHarvestLocal() {
      if (!gameState) return;
      for (const r of gameState.resources) {
        const dist = Math.hypot(r.x - localX, r.y - localY);
        if (dist < 35 && r.amount > 0) {
          inventory[r.type] = (inventory[r.type] || 0) + 1;
          r.amount--;
          if (r.amount <= 0) {
            gameState.resources = gameState.resources.filter(res => res.id !== r.id);
          }
          updateInventoryUI();
          fetch(API_BASE + '/api/game', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'harvest', playerId, resourceId: r.id })
          });
          break;
        }
      }
    }
    
    function performAttack() {
      if (!gameState || !weapon) return;
      for (const z of gameState.zombies) {
        const dist = Math.hypot(z.x - localX, z.y - localY);
        if (dist < (weapon.type === '弓箭' ? 150 : 60)) {
          // 添加攻击特效
          let damageNum = {x:z.x,y:z.y,life:20,text:"-"+weapon.attack}; damageNumbers.push(damageNum); let damageNum = {x:z.x,y:z.y,life:20,text:"-"+weapon.attack}; damageNumbers.push(damageNum); let damageNum = {x:z.x,y:z.y,life:20,text:"-"+weapon.attack}; damageNumbers.push(damageNum); let damageNum = {x:z.x,y:z.y,life:20,text:"-"+weapon.attack}; damageNumbers.push(damageNum); attackEffects.push({ x: z.x, y: z.y, life: 15 });
          
          z.health -= weapon.attack;
          if (z.health <= 0) {
            gameState.zombies = gameState.zombies.filter(zz => zz.id !== z.id);
          }
          fetch(API_BASE + '/api/game', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'attack', playerId, targetId: z.id, damage: weapon.attack })
          });
          break;
        }
      }
    }
    
    function useHealthPotion() {
      if (healthPotions > 0 && health < 100) {
        healthPotions--;
        health = Math.min(100, health + 50);
        updateInventoryUI();
      }
    }
    
    async function syncToServer() {
      try {
        const res = await fetch(API_BASE + '/api/game?playerId=' + playerId + '&x=' + Math.floor(localX) + '&y=' + Math.floor(localY));
        gameState = await res.json();
      } catch (e) {}
    }
    
    function render() {
      const W = canvas.width;
      const H = canvas.height;
      
      // 显示公告
      if (gameState) {
        let announceText = '';
        if (gameState.phase === 'twilight') announceText = '⚠️ 黄昏来临，僵尸即将出没！';
        else if (gameState.phase === 'night' && gameState.wave > 0) announceText = '🧟 第' + gameState.wave + '波僵尸来袭！';
        else if (gameState.phase === 'day' && gameState.wave > 0) announceText = '☀️ 白天到了，安全了！';
        document.getElementById('announce').textContent = announceText;
      }
      
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, W, H);
      
      const camX = localX - W / 2;
      const camY = localY - H / 2;
      
      // 网格
      ctx.strokeStyle = '#2a2a3e';
      for (let x = -camX % 32; x < W; x += 32) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = -camY % 32; y < H; y += 32) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
      
      if (!gameState) return;
      
      const RES_COLORS = { wood: '#92400e', stone: '#6b7280', metal: '#475569', food: '#dc2626' };
      const RES_ICONS = { wood: '🪵', stone: '🪨', metal: '🔩', food: '🍎' };
      
      // 资源
      for (const r of gameState.resources) {
        const sx = r.x - camX, sy = r.y - camY;
        if (sx < -30 || sx > W + 30 || sy < -30 || sy > H + 30) continue;
        if (r.amount <= 0) continue;
        ctx.fillStyle = RES_COLORS[r.type] || '#888';
        ctx.fillRect(sx - 10, sy - 10, 20, 20);
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(RES_ICONS[r.type] || '?', sx, sy + 4);
      }
      
      // 僵尸
      const zombieIcons = { normal: '🧟', fast: '💨', giant: '👹', crawler: '🕷️' };
      for (const z of gameState.zombies) {
        const sx = z.x - camX, sy = z.y - camY;
        ctx.fillStyle = z.type === 'giant' ? '#dc2626' : z.type === 'fast' ? '#f59e0b' : '#84cc16';
        ctx.beginPath();
        ctx.arc(sx, sy, z.type === 'giant' ? 22 : 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.font = '11px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(zombieIcons[z.type] || '🧟', sx, sy + 4);
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(sx - 12, sy - 25, 24 * (z.health / (z.type === 'giant' ? 200 : 50)), 3);
      }
      
      // 建筑
      for (const b of gameState.buildings || []) {
        const sx = b.x - camX, sy = b.y - camY;
        if (b.type === 'turret') {
          ctx.fillStyle = '#3b82f6';
          ctx.beginPath();
          ctx.arc(sx, sy, 20, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = '16px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('🔫', sx, sy + 5);
        } else if (b.type === 'wall_stone') {
          ctx.fillStyle = '#78716c';
          ctx.fillRect(sx - 25, sy - 25, 50, 50);
          ctx.fillStyle = '#fff';
          ctx.font = '16px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('🧱', sx, sy + 5);
        } else {
          ctx.fillStyle = '#92400e';
          ctx.fillRect(sx - 20, sy - 20, 40, 40);
          ctx.fillStyle = '#fff';
          ctx.font = '16px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('🏠', sx, sy + 5);
        }
      }
      
      // 子弹
      for (const bullet of gameState.bullets || []) {
        const sx = bullet.x - camX, sy = bullet.y - camY;
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath();
        ctx.arc(sx, sy, 5, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // 攻击特效
      for (const eff of attackEffects) {
        const sx = eff.x - camX, sy = eff.y - camY;
        ctx.fillStyle = `rgba(255, 200, 0, ${eff.life / 10})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 30 * (1 - eff.life / 15), 0, Math.PI * 2);
        ctx.fill();
      }
      
      // 更新特效
      attackEffects = attackEffects.filter(e => {
        e.life--;
        return e.life > 0;
      });
      
      // 其他玩家
      for (const p of gameState.players) {
        if (p.id === playerId) continue;
        const sx = p.x - camX, sy = p.y - camY;
        ctx.fillStyle = '#22c55e';
        ctx.beginPath(); ctx.arc(sx, sy, 14, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(p.name, sx, sy - 20);
      }
      
      // 自己
      ctx.fillStyle = '#4ade80';
      ctx.beginPath();
      ctx.arc(W / 2, H / 2, 16, 0, Math.PI * 2);
      ctx.fill();
      if (weapon) {
        ctx.font = '14px Arial';
        ctx.fillText('🗡️', W / 2 + 18, H / 2);
      }
      ctx.fillStyle = '#fff';
      ctx.font = '11px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('你', W / 2, H / 2 - 22);
      ctx.fillStyle = '#ef4444';
      ctx.fillRect(W / 2 - 18, H / 2 - 20, 36 * (health / 100), 4);
    }
    
    async function joinGame() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) return;
      
      try {
        const res = await fetch(API_BASE + '/api/game', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'join', name })
        });
        
        const data = await res.json();
        playerId = data.playerId;
        // 只在加入时使用服务器位置，之后只用本地预测
        if (localX === 1000 && localY === 1000) {
          localX = data.player.x;
          localY = data.player.y;
        }
        
        document.getElementById('login').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('inventory').classList.remove('hidden');
        document.getElementById('controls').classList.remove('hidden');
        
        gameLoop();
        syncToServer();
      } catch (e) {
        alert('连接失败');
      }
    }
    
    const RECIPES = {
      '木剑': { wood: 8, attack: 5 },
      '石剑': { wood: 5, stone: 10, attack: 10 },
      '弓箭': { wood: 10, herb: 5, attack: 8 },
      '绷带': { herb: 2, food: 1, heal: 30 },
      '血瓶': { herb: 5, food: 3, heal: 50 },
      '木墙': { wood: 15, hp: 100, build: 'wall_wood' },
      '石墙': { wood: 5, stone: 20, hp: 300, build: 'wall_stone' },
      '炮台': { wood: 30, stone: 30, metal: 10, hp: 100, build: 'turret' }
    };
    
    function updateInventoryUI() {
      const RES_ICONS = { wood: '🪵', stone: '🪨', metal: '🔩', food: '🍎', herb: '🌿' };
      let html = '';
      for (const [type, count] of Object.entries(inventory)) {
        if (count > 0) html += `<div>${RES_ICONS[type]} ${count}</div>`;
      }
      if (weapon) html += `<div>🗡️ ${weapon.name} (${weapon.attack})</div>`;
      if (healthPotions > 0) html += `<div>🧪 血瓶 x${healthPotions}</div>`;
      document.getElementById('invList').innerHTML = html || '空';
      
      document.querySelectorAll('#crafting button').forEach(btn => {
        const r = RECIPES[btn.dataset.recipe];
        let can = true;
        for (const [m, n] of Object.entries(r)) {
          if (m !== 'attack' && (inventory[m] || 0) < n) can = false;
        }
        btn.disabled = !can;
      });
    }
    
    document.querySelectorAll('#crafting button').forEach(btn => {
      btn.addEventListener('click', () => {
        const r = RECIPES[btn.dataset.recipe];
        for (const [m, n] of Object.entries(r)) {
          if (m !== 'attack' && m !== 'heal' && m !== 'hp' && m !== 'build') inventory[m] -= n;
        }
        if (r.attack) weapon = { name: btn.dataset.recipe, attack: r.attack, type: btn.dataset.recipe };
        if (r.heal) healthPotions++;
        if (btn.dataset.recipe === '绷带') health = Math.min(100, health + 30);
        if (btn.dataset.recipe === '血瓶') health = Math.min(100, health + 50);
        
        // 建造建筑
        if (r.build) {
          fetch(API_BASE + '/api/game', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              action: 'build', 
              playerId, 
              buildingType: r.build, 
              x: localX, 
              y: localY 
            })
          });
        }
        
        updateInventoryUI();
      });
      btn.addEventListener('touchstart', e => {
        e.stopPropagation();
        btn.click();
      });
    });
    
    document.getElementById('joinBtn').addEventListener('click', joinGame);
  </script>
</body>
</html>
